<nav aria-label="Breadcrumbs" class="breadcrumb-nav">
  <ol class="breadcrumb-list">
    {% for crumb in crumbs %}
      <li role="menuitem">
        {% if crumb.active %}
          <span aria-current="page">{{ crumb.title }}</span>
        {% else %}
          <a href="{{ crumb.url }}">{{ crumb.title }}</a>
        {% endif %}
      </li>
    {% endfor %}
  </ol>
</nav>
